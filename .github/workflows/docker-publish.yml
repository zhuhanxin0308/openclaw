name: Publish OpenClaw Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # 官方要求：必须赋予这些权限，才能写入镜像和生成防伪证明
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 官方推荐：智能提取元数据和标签
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/openclaw
          # 默认会自动生成 latest 和基于 commit 的 tag

      # 核心构建与推送（结合了官方写法与你的 GHA 缓存省流大法）
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 官方推荐：生成构建来源防伪证明 (Supply Chain Security)
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openclaw
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
