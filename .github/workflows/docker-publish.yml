name: Build and Push Docker Image (2026 Edition)

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master 请替换为 master
    paths:
      # 极致省流：只有关键文件变动才触发构建，保护你的 2000 分钟额度
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/**'
  workflow_dispatch: # 留一个网页手动点击触发的按钮

jobs:
  build-and-push:
    runs-on: ubuntu-latest # 使用 GitHub 官方提供的 Ubuntu 节点，消耗免费额度

    steps:
      # 1. 拉取代码 (使用 v4 稳定版)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 启用跨平台/高级构建引擎 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 构建并推送，启用 GHA 原生缓存魔法
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 自动打上 latest 和 当前代码 hash 两个标签，方便回滚
          tags: |
            ${{ secrets.openclaw.DOCKERHUB_USERNAME }}/openclaw:latest
            ${{ secrets.openclaw.DOCKERHUB_USERNAME }}/openclaw:${{ github.sha }}
          
          # 2026 免费白嫖怪最爱：使用 GitHub 的 10GB 免费 Actions 缓存 (type=gha)
          # 它会把第一次编译耗时的 C++ 库存下来，以后只要源码没变，构建时间从几分钟缩短到十几秒！
          cache-from: type=gha
          cache-to: type=gha,mode=max
